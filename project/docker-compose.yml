services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - AUTH_SECRET=wzn_8f6b7a2e4d91c0a73f5e92b1a86d40c9b7e51f3a24dc8e66
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - FALLBACK_STREAM=[SYSTEM] ALL STATIONS CLEAR // ROTATING TIMELINE STANDBY
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:3000,http://localhost:3001,http://127.0.0.1,http://127.0.0.1:80,http://127.0.0.1:3000,http://127.0.0.1:3001}
    ports:
      - "3000:3000"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - PANEL_NAME=NEWS DESK
      - PANEL_DESC=Real-Time Ticker & Queue Control Management System
      - TAB_Title=Control Panel
      - FALLBACK_STREAM=[SYSTEM] ALL STATIONS CLEAR // ROTATING TIMELINE STANDBY
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
